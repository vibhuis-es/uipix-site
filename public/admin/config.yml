backend:
  name: proxy
  proxy_url: http://localhost:8081/api/v1

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

# Slug settings
slug:
  encoding: "ascii"
  clean_accents: true

collections:
  # ============================================
  # CASE STUDIES - Add/edit/delete from the UI
  # ============================================
  - name: "case-studies"
    label: "Case Studies"
    label_singular: "Case Study"
    folder: "src/content/case-studies"
    create: true
    delete: true
    slug: "{{slug}}"
    sortable_fields: ["title", "order", "year"]
    summary: "{{title}} ({{year}})"
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "e.g. Encore" }
      - { label: "Subtitle", name: "subtitle", widget: "string", hint: "e.g. Hotel Financial Management Platform" }
      - { label: "Year", name: "year", widget: "string", hint: "e.g. 2022" }
      - { label: "Duration", name: "duration", widget: "string", hint: "e.g. 8 months" }
      - { label: "Platforms", name: "platforms", widget: "string", hint: "e.g. Web & Mobile" }
      - { label: "Role", name: "role", widget: "string", hint: "e.g. UX Designer" }
      - { label: "Industry", name: "industry", widget: "string", hint: "e.g. Hospitality & FinTech" }
      - { label: "Display Order", name: "order", widget: "number", default: 1, hint: "Lower numbers appear first on homepage" }
      - { label: "Draft", name: "draft", widget: "boolean", default: false, hint: "Set to true to hide from the site" }
      - { label: "Coming Soon", name: "comingSoon", widget: "boolean", default: false, hint: "Show as placeholder card" }

      # Images - all editable from the CMS UI
      - label: "Card Image"
        name: "cardImage"
        widget: "image"
        hint: "Thumbnail shown on homepage card (recommended: 1380x720)"
        required: true

      - label: "Hero Image"
        name: "heroImage"
        widget: "image"
        hint: "Large banner image at top of case study page"
        required: false

      # Structured content sections
      - label: "Problem Statement"
        name: "problem"
        widget: "markdown"
        hint: "Describe the problem this project solved"

      - label: "Content Body"
        name: "body"
        widget: "markdown"
        hint: "Full case study content with images. Use markdown image syntax: ![alt](/images/uploads/filename.webp)"

      # Gallery images - all manageable from CMS
      - label: "Gallery Images"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Add project screenshots, wireframes, and mockups"
        fields:
          - { label: "Image", name: "image", widget: "image" }
          - { label: "Caption", name: "caption", widget: "string", required: false }
          - { label: "Section", name: "section", widget: "select", options: ["wireframes", "high-fidelity", "mobile", "other"], default: "high-fidelity" }

      # Results/Impact metrics
      - label: "Impact Metrics"
        name: "metrics"
        widget: "list"
        required: false
        hint: "Key results and impact numbers"
        fields:
          - { label: "Value", name: "value", widget: "string", hint: "e.g. 26% or 3x" }
          - { label: "Label", name: "label", widget: "string", hint: "e.g. Reduction in expenses" }
          - { label: "Description", name: "description", widget: "string", required: false }

      - label: "Reflection"
        name: "reflection"
        widget: "markdown"
        required: false
        hint: "What you learned from this project"

  # ============================================
  # HOMEPAGE SETTINGS
  # ============================================
  - name: "settings"
    label: "Site Settings"
    files:
      - file: "src/content/settings/site.json"
        label: "General Settings"
        name: "site"
        fields:
          - { label: "Name", name: "name", widget: "string", default: "Payal" }
          - { label: "Tagline", name: "tagline", widget: "string", default: "UX Designer focused on clarity and human-centered solutions" }
          - { label: "Bio", name: "bio", widget: "text", default: "I design digital products that solve real problems through research, collaboration, and thoughtful iteration. Based in Dallas, Texas working with teams worldwide." }
          - { label: "Email", name: "email", widget: "string", default: "payalbhutani26@gmail.com" }
          - { label: "Location", name: "location", widget: "string", default: "Dallas, Texas" }
          - label: "Profile Photo"
            name: "profilePhoto"
            widget: "image"
            default: "/images/profile-photo.webp"
            hint: "Your profile photo for the homepage hero"
          - label: "Social Links"
            name: "social"
            widget: "object"
            fields:
              - { label: "LinkedIn URL", name: "linkedin", widget: "string", required: false }
              - { label: "Facebook URL", name: "facebook", widget: "string", required: false }
              - { label: "Twitter/X URL", name: "twitter", widget: "string", required: false }
              - { label: "Dribbble URL", name: "dribbble", widget: "string", required: false }
              - { label: "Behance URL", name: "behance", widget: "string", required: false }
